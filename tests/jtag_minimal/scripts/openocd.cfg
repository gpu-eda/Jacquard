#
# OpenOCD config used by capture_bitbang.py. Drives the vendored
# Hazard3 DTM through cocotb's remote_bitbang server during an RTL
# simulation; the server tees every inbound byte to data/bitbang.rec
# for replay through `jacquard cosim --jtag-replay`.
#
# 5-bit IR, IDCODE=0xdeadbeef set in top.sv. The riscv target driver
# does init (sets dmactive=1) + read DMSTATUS + then we issue an
# explicit `riscv dmi_write` to DATA0 with the magic value. The fake
# hart (hart_halted = hart_req_halt in top.sv) keeps the riscv driver
# from giving up during examination — it sees a halted hart and
# proceeds.

adapter driver remote_bitbang
remote_bitbang host localhost
remote_bitbang port 9824
transport select jtag
adapter speed 1

set _CHIPNAME jtag
jtag newtap $_CHIPNAME cpu -irlen 5
set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscv -chain-position $_TARGETNAME

# Generous DMI timeout — Jacquard cosim is fast, but the cocotb
# capture run uses Icarus and the JTAG protocol is bit-serial.
riscv set_command_timeout_sec 10
